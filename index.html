<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grand City Auto 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Montserrat', sans-serif; background: #050508; }
        canvas { display: block !important; width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>
<script>
let scene, camera, renderer, clock;
let player, playerVel = new THREE.Vector3();
let buildings = [], vehicles = [], pedestrians = [];
let inputMove = {x:0, y:0}, inputLook = {x:0, y:0};
let camRot = {yaw:0, pitch:-0.3};
let health = 100;

function init3D() {
    clock = new THREE.Clock();
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0c14);
    scene.fog = new THREE.FogExp2(0x0a0c14, 0.012);

    camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Iluminação
    let light = new THREE.DirectionalLight(0x2b3a55, 0.8);
    light.position.set(100, 150, 50);
    light.castShadow = true;
    light.shadow.mapSize.width = 2048;
    light.shadow.mapSize.height = 2048;
    const d = 150;
    light.shadow.camera.left = -d;
    light.shadow.camera.right = d;
    light.shadow.camera.top = d;
    light.shadow.camera.bottom = -d;
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x152035, 0.6));

    // Chão
    let groundGeo = new THREE.PlaneGeometry(500, 500);
    let groundMat = new THREE.MeshStandardMaterial({color:0x0a0a0f, roughness:0.7});
    let ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI/2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Edifícios
    for(let x=-3; x<4; x++) {
        for(let z=-3; z<4; z++) {
            let h = Math.random()*40+20;
            let building = new THREE.Mesh(
                new THREE.BoxGeometry(30, h, 30),
                new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(0.6,0.1,0.2), roughness:0.5})
            );
            building.position.set(x*50, h/2, z*50);
            building.castShadow = true;
            building.receiveShadow = true;
            scene.add(building);
            buildings.push(building);
        }
    }

    // Jogador
    player = new THREE.Mesh(
        new THREE.CapsuleGeometry(1, 2, 4, 8),
        new THREE.MeshStandardMaterial({color:0x1f2937})
    );
    player.position.set(0, 2, 0);
    player.castShadow = true;
    scene.add(player);

    // Carros
    for(let i=0; i<5; i++) {
        let carBody = new THREE.Mesh(
            new THREE.BoxGeometry(2, 1.5, 5),
            new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(Math.random(),0.8,0.5), metalness:0.8, roughness:0.2})
        );
        carBody.position.set((Math.random()-0.5)*200, 1, (Math.random()-0.5)*200);
        carBody.castShadow = true;
        carBody.receiveShadow = true;
        scene.add(carBody);
        vehicles.push({mesh:carBody, vel:new THREE.Vector3((Math.random()-0.5)*0.1, 0, (Math.random()-0.5)*0.1)});
    }

    // Peões
    for(let i=0; i<8; i++) {
        let ped = new THREE.Mesh(
            new THREE.CapsuleGeometry(0.6, 1.7, 4, 8),
            new THREE.MeshStandardMaterial({color:0x4f46e5})
        );
        ped.position.set((Math.random()-0.5)*150, 1.5, (Math.random()-0.5)*150);
        ped.castShadow = true;
        scene.add(ped);
        pedestrians.push({mesh:ped, vel:new THREE.Vector3((Math.random()-0.5)*0.05, 0, (Math.random()-0.5)*0.05)});
    }

    window.addEventListener('resize', ()=>{
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

function setupControls() {
    // Toque para movimento
    document.addEventListener('touchstart', (e) => {
        if(e.touches.length === 1) {
            let x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
            let y = (e.touches[0].clientY / window.innerHeight) * 2 - 1;
            inputMove.x = x;
            inputMove.y = y;
        }
    }, {passive: true});

    document.addEventListener('touchmove', (e) => {
        if(e.touches.length === 1) {
            let x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
            let y = (e.touches[0].clientY / window.innerHeight) * 2 - 1;
            inputMove.x = x;
            inputMove.y = y;
        }
    }, {passive: true});

    document.addEventListener('touchend', () => {
        inputMove.x = 0;
        inputMove.y = 0;
    }, {passive: true});

    // Teclado para desktop
    document.addEventListener('keydown', (e) => {
        if(e.key === 'ArrowUp' || e.key === 'w') inputMove.y = 1;
        if(e.key === 'ArrowDown' || e.key === 's') inputMove.y = -1;
        if(e.key === 'ArrowLeft' || e.key === 'a') inputMove.x = -1;
        if(e.key === 'ArrowRight' || e.key === 'd') inputMove.x = 1;
    });

    document.addEventListener('keyup', () => {
        inputMove.x = 0;
        inputMove.y = 0;
    });

    // Mouse para câmara
    document.addEventListener('mousemove', (e) => {
        inputLook.x = (e.clientX / window.innerWidth) * 0.5 - 0.25;
        inputLook.y = (e.clientY / window.innerHeight) * 0.5 - 0.25;
    });
}

function animate() {
    requestAnimationFrame(animate);

    playerVel.x = inputMove.x * 0.2;
    playerVel.z = inputMove.y * 0.2;
    player.position.add(playerVel);

    camRot.yaw += inputLook.x * 0.05;
    camRot.pitch -= inputLook.y * 0.05;
    camRot.pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, camRot.pitch));

    camera.position.x = player.position.x + Math.sin(camRot.yaw)*8;
    camera.position.y = player.position.y + 3;
    camera.position.z = player.position.z + Math.cos(camRot.yaw)*8;
    camera.lookAt(player.position.x, player.position.y+1, player.position.z);

    vehicles.forEach(v=>{
        v.mesh.position.add(v.vel);
        if(Math.abs(v.mesh.position.x)>250) v.vel.x *= -1;
        if(Math.abs(v.mesh.position.z)>250) v.vel.z *= -1;
    });

    pedestrians.forEach(p=>{
        p.mesh.position.add(p.vel);
        if(Math.random()<0.01) { p.vel.x=(Math.random()-0.5)*0.1; p.vel.z=(Math.random()-0.5)*0.1; }
        if(Math.abs(p.mesh.position.x)>250) p.vel.x*=-1;
        if(Math.abs(p.mesh.position.z)>250) p.vel.z*=-1;
    });

    renderer.render(scene, camera);
}

init3D();
setupControls();
animate();
</script>
</body>
</html>
